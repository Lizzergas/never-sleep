name: Deploy landing

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Verify landing site
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run lint
          bun run typecheck
          bun --filter @neversleep/landing test

      - name: Build landing site
        working-directory: web
        run: bun --filter @neversleep/landing build

      - name: Assert GitHub Pages artifacts
        run: |
          test -f web/apps/landing/dist/index.html
          test -f web/apps/landing/dist/CNAME
          test -f web/apps/landing/dist/.nojekyll
          grep -q 'neversleep.app' web/apps/landing/dist/CNAME

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/apps/landing/dist

      - id: deployment
        uses: actions/deploy-pages@v4