name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Tests + Android APK on Linux (fast, cheap).
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Tests and Android build
        run: ./gradlew jvmTest :server:test :app:androidApp:assembleDebug

  # iOS klib compilation needs a macOS runner. Delete this job if macOS
  # minutes are a concern — it only proves the iOS target keeps compiling.
  ios-compile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile iOS target
        run: ./gradlew :app:shared:compileKotlinIosArm64
