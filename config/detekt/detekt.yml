# Template detekt config: default rules with Compose-aware adjustments.
# buildUponDefaultConfig=true in the convention plugin — only overrides here.

naming:
  FunctionNaming:
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9_]*'

style:
  MagicNumber:
    ignoreAnnotated: ['Composable']
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
  UnusedPrivateMember:
    ignoreAnnotated: ['Preview']
  ReturnCount:
    max: 4

complexity:
  LongMethod:
    ignoreAnnotated: ['Composable']
  LongParameterList:
    ignoreAnnotated: ['Composable']
  TooManyFunctions:
    ignoreAnnotatedFunctions: ['Composable', 'Preview']

exceptions:
  # The template's safeApiCall deliberately maps broad exceptions to AppError.
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    ignoredExceptionTypes:
      - 'CancellationException'
